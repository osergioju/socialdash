version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialdash
      POSTGRES_USER: socialdash
      POSTGRES_PASSWORD: socialdash_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://socialdash:socialdash_dev@postgres:5432/socialdash"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRES_IN: "7d"
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
